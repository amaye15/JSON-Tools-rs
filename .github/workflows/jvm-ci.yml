name: JVM Bindings CI

on:
  push:
    branches: [main, master]
    tags: ['*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: jvm-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Rust-side correctness/lint for the jvm feature is already covered by rust-ci.yml's
  # `lint` job (`cargo clippy --all-features`, which includes `jvm`) and `msrv` job
  # confirmed separately to be 1.80-compatible with `--features jvm` -- no need to
  # duplicate that here.

  native-build:
    name: Build native lib (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            can_test: true
            # PGO phase 1 (see .github/actions/pgo-profile): native, tested, no
            # container, no cross-linker, no RUSTFLAGS-composition risk -- the
            # lowest-risk target to prove the composite action's mechanics on.
            # aarch64 is deliberately still plain (phase 6): its
            # .cargo/config.toml linker flags are exactly the case
            # extra-rustflags composition exists to protect, and that's proven
            # safest *after* the mechanism is validated elsewhere first.
            pgo: true
          - target: aarch64-unknown-linux-gnu
            can_test: false
            pgo: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: jvm-native-${{ matrix.target }}
      - name: Install cross-compilation dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Generate PGO training profile
        if: matrix.pgo
        id: pgo
        uses: ./.github/actions/pgo-profile
        with:
          target-triple: ${{ matrix.target }}
      - name: Build native library (release)
        # No RUSTFLAGS override needed here for the non-PGO case (unlike
        # maturin-ci.yml's macOS wheel job): .cargo/config.toml only sets
        # target-cpu=native for *-apple-darwin targets, so these Linux builds
        # are portable by default. When matrix.pgo is true, RUSTFLAGS comes
        # from the pgo-profile action's composed output instead. `cargo build`
        # only emits compiler diagnostics for units it actually (re)compiles,
        # so the profile-drop check below must read this same invocation's
        # captured log -- a second, separately-run build would hit cargo's
        # fingerprint cache and emit no diagnostics at all, making that check
        # meaningless.
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.pgo && steps.pgo.outputs.rustflags || '' }}
        run: |
          set -euo pipefail
          cargo build --locked --release --features jvm --target ${{ matrix.target }} 2>&1 | tee /tmp/native-build.log
      - name: Report PGO profile coverage
        # Informational only, not a hard gate: LLVM's -pgo-warn-missing-function
        # fires for *every* generic/stdlib instantiation compiled into this
        # crate's own compilation units that bench_quick's training run didn't
        # happen to exercise (e.g. error-conversion impls for errors that only
        # occur on invalid input, which a clean training run never produces) --
        # confirmed empirically (~1-2% of ~5000 functions, all cold/error-path
        # or generic-collection boilerplate, zero hits among flatten/unflatten/
        # transform's actual hot-path functions). A real rustc/flag mismatch
        # between the instrument and profile-use builds would look categorically
        # different (a much larger fraction missing, including hot-path
        # functions), which is why this reports rather than pattern-matches a
        # substring that can't actually distinguish "expected cold path" from
        # "broken profile application" -- see this job's own history for why
        # that distinction matters (a prior PGO attempt shipped 5 broken CI
        # legs before being caught).
        if: matrix.pgo
        shell: bash
        run: |
          set -euo pipefail
          missing=$(grep -c 'no profile data available' /tmp/native-build.log || true)
          echo "PGO: $missing function-instantiation(s) with no training coverage (informational -- see step comment for why this isn't a hard gate)"
          grep -oE 'for function [A-Za-z0-9_.$]+' /tmp/native-build.log | sed 's/for function //' | sort -u | c++filt | sed -n '1,20p' || true
      - name: Upload native library artifact
        uses: actions/upload-artifact@v7
        with:
          name: jvm-native-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/libjson_tools_rs.so

  mvn-test:
    name: JVM Tests (Java ${{ matrix.java-version }})
    needs: native-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ["17", "21"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven
          cache-dependency-path: jvm/pom.xml
      - uses: actions/download-artifact@v8
        with:
          name: jvm-native-x86_64-unknown-linux-gnu
          path: jvm/src/main/resources/native/linux-x86_64
      - name: Run JVM test suite
        working-directory: jvm
        run: mvn -B test

  package:
    name: Package fat jar
    needs: [native-build, mvn-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: jvm/pom.xml
      - uses: actions/download-artifact@v8
        with:
          name: jvm-native-x86_64-unknown-linux-gnu
          path: jvm/src/main/resources/native/linux-x86_64
      - uses: actions/download-artifact@v8
        with:
          name: jvm-native-aarch64-unknown-linux-gnu
          path: jvm/src/main/resources/native/linux-aarch64
      - name: Check version synchronization
        working-directory: jvm
        run: |
          CARGO_VER=$(grep '^version' ../Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          POM_VER=$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)
          if [ "$CARGO_VER" != "$POM_VER" ]; then
            echo "::error::Version mismatch: Cargo.toml=$CARGO_VER, jvm/pom.xml=$POM_VER"
            exit 1
          fi
          echo "Versions in sync: $CARGO_VER"
      - name: Package (tests already run in mvn-test)
        working-directory: jvm
        run: mvn -B package -DskipTests
      - name: Upload packaged jar
        uses: actions/upload-artifact@v7
        with:
          name: json-tools-rs-spark-jar
          path: jvm/target/json-tools-rs-spark-*.jar

  release:
    name: Release to Maven Central
    # Depends on `package` (not just native-build/mvn-test) so the version-sync
    # check it runs gates this too -- a Cargo.toml/pom.xml mismatch should never
    # reach a Maven Central publish, which can't be undone.
    needs: [native-build, mvn-test, package]
    # Tag pushes only -- deliberately narrower than maturin-ci.yml's Release job
    # (which also allows workflow_dispatch reruns): a Maven Central publish is
    # permanent, so there's no "just rerun it manually" safety net worth having here.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: jvm/pom.xml
          # Configures ~/.m2/settings.xml: a <server id="central"> entry (matching
          # <publishingServerId>central</publishingServerId> in jvm/pom.xml's release
          # profile) sourced from the env vars below, plus GPG key import and a
          # gpg.passphrase property sourced from GPG_PASSPHRASE.
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - uses: actions/download-artifact@v8
        with:
          name: jvm-native-x86_64-unknown-linux-gnu
          path: jvm/src/main/resources/native/linux-x86_64
      - uses: actions/download-artifact@v8
        with:
          name: jvm-native-aarch64-unknown-linux-gnu
          path: jvm/src/main/resources/native/linux-aarch64
      - name: Deploy to Maven Central (signed, sources + javadoc, auto-publish)
        working-directory: jvm
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B -P release deploy -DskipTests
