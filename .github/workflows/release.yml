name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Wait for the maturin-ci workflow to complete (it is triggered by the same tag push)
  # and then create a GitHub Release with its artifacts.
  #
  # Wheel building and PyPI publishing are handled by maturin-ci.yml's release job.
  # This workflow only creates the GitHub Release with generated notes.
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
