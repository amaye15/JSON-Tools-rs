name: Python Wheels CI

on:
  push:
    branches: [main, master]
    tags: ['*']
  workflow_dispatch:

concurrency:
  group: maturin-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
            features: python,mimalloc
          - runner: ubuntu-22.04
            target: x86
            features: python
          - runner: ubuntu-22.04
            target: aarch64
            features: python,mimalloc
          - runner: ubuntu-22.04
            target: armv7
            features: python
          # Temporarily disabled: s390x fails with simd-json fallback implementation issues on big-endian architecture
          # - runner: ubuntu-22.04
          #   target: s390x
          - runner: ubuntu-22.04
            target: ppc64le
            features: python,mimalloc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter --features ${{ matrix.platform.features }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist
      - name: pytest
        if: ${{ startsWith(matrix.platform.target, 'x86_64') }}
        shell: bash
        run: |
          set -e
          python3 -m venv .venv
          source .venv/bin/activate
          pip install json-tools-rs --no-index --find-links dist --force-reinstall
          pip install pytest
          pytest
      - name: pytest
        if: ${{ !startsWith(matrix.platform.target, 'x86') && matrix.platform.target != 'ppc64' }}
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: ${{ matrix.platform.target }}
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update
            apt-get install -y --no-install-recommends python3 python3-pip
            pip3 install -U pip pytest
          run: |
            set -e
            pip3 install json-tools-rs --no-index --find-links dist --force-reinstall
            pytest

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
            features: python,mimalloc
          - runner: ubuntu-22.04
            target: x86
            features: python
          - runner: ubuntu-22.04
            target: aarch64
            features: python,mimalloc
          - runner: ubuntu-22.04
            target: armv7
            features: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter --features ${{ matrix.platform.features }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist
      - name: pytest
        if: ${{ startsWith(matrix.platform.target, 'x86_64') }}
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:latest
          options: -v ${{ github.workspace }}:/io -w /io
          run: |
            set -e
            apk add py3-pip py3-virtualenv
            python3 -m virtualenv .venv
            source .venv/bin/activate
            pip install json-tools-rs --no-index --find-links dist --force-reinstall
            pip install pytest
            pytest
      - name: pytest
        if: ${{ !startsWith(matrix.platform.target, 'x86') }}
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: ${{ matrix.platform.target }}
          distro: alpine_latest
          githubToken: ${{ github.token }}
          install: |
            apk add py3-virtualenv
          run: |
            set -e
            python3 -m virtualenv .venv
            source .venv/bin/activate
            pip install pytest
            pip install json-tools-rs --no-index --find-links dist --force-reinstall
            pytest

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: windows-latest
            target: x64
          # Temporarily disabled: x86 fails with architecture mismatch (32-bit Rust target with 64-bit Python interpreter)
          # - runner: windows-latest
          #   target: x86
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          key: pgo-windows-${{ matrix.platform.target }}
      - name: Install maturin
        shell: bash
        run: pip install maturin
      # PGO (Profile-Guided Optimization): build once with -Cprofile-generate, run a
      # representative training workload through the actual Python bindings, merge the
      # collected profiles, then rebuild with -Cprofile-use for the wheel that actually
      # ships. Locally validated ~5-17% faster across flatten/unflatten/normal scenarios
      # -- see CONTRIBUTING.md's "Profile-Guided Optimization" section. Native-runner
      # platforms only (windows/macos): PGO training must execute on the target
      # architecture, which isn't straightforward for the Docker/QEMU-based linux and
      # musllinux legs, so those are deliberately left on the plain build path for now.
      - name: PGO instrumented build + train
        shell: bash
        env:
          RUSTFLAGS: "-Cprofile-generate=${{ github.workspace }}/pgo-data"
        run: |
          set -e
          mkdir -p pgo-data
          python3 -m venv .venv-pgo-train
          source .venv-pgo-train/Scripts/activate
          maturin develop --release --features python,mimalloc
          python3 scripts/pgo_train.py
      - name: Merge PGO profiles
        shell: bash
        run: |
          set -e
          PROFDATA="$(rustup which llvm-profdata)"
          "$PROFDATA" merge -o pgo-data/merged.profdata pgo-data/*.profraw
      - name: Build PGO-optimized wheels
        shell: bash
        env:
          RUSTFLAGS: "-Cprofile-use=${{ github.workspace }}/pgo-data/merged.profdata -Cllvm-args=-pgo-warn-missing-function"
        run: maturin build --release --features python,mimalloc --interpreter python3 --out dist
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist
      - name: pytest
        if: ${{ !startsWith(matrix.platform.target, 'aarch64') }}
        shell: bash
        run: |
          set -e
          python3 -m venv .venv
          source .venv/Scripts/activate
          pip install json-tools-rs --no-index --find-links dist --force-reinstall
          pip install pytest
          pytest

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    # .cargo/config.toml sets `-C target-cpu=native` for these targets, which is correct for
    # local source builds (native = the machine doing the build) but wrong here: this job builds
    # a binary wheel *once* on the runner's CPU and ships it to arbitrary end-user machines via
    # PyPI. `target-cpu=native` would bake in the runner's specific CPU features (e.g. AVX-512),
    # causing SIGILL crashes for users on older/different CPUs. RUSTFLAGS fully replaces (does not
    # merge with) config.toml's target.<triple>.rustflags, so we must restate the link-arg flags
    # that are otherwise required for the cdylib to link on macOS.
    env:
      RUSTFLAGS: "-C link-arg=-undefined -C link-arg=dynamic_lookup"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          key: pgo-macos-${{ matrix.platform.target }}
      - name: Install maturin
        run: pip install maturin
      # PGO: see the matching step in the `windows` job above for the full rationale.
      # The link-arg flags from this job's `env.RUSTFLAGS` above must be restated here
      # (RUSTFLAGS fully replaces, not merges) alongside the profile flag.
      - name: PGO instrumented build + train
        env:
          RUSTFLAGS: "-C link-arg=-undefined -C link-arg=dynamic_lookup -Cprofile-generate=${{ github.workspace }}/pgo-data"
        run: |
          set -e
          mkdir -p pgo-data
          python3 -m venv .venv-pgo-train
          source .venv-pgo-train/bin/activate
          maturin develop --release --features python,mimalloc
          python3 scripts/pgo_train.py
      - name: Merge PGO profiles
        run: |
          set -e
          PROFDATA="$(rustup which llvm-profdata)"
          "$PROFDATA" merge -o pgo-data/merged.profdata pgo-data/*.profraw
      - name: Build PGO-optimized wheels
        env:
          RUSTFLAGS: "-C link-arg=-undefined -C link-arg=dynamic_lookup -Cprofile-use=${{ github.workspace }}/pgo-data/merged.profdata -Cllvm-args=-pgo-warn-missing-function"
        run: maturin build --release --features python,mimalloc --interpreter python3 --out dist
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist
      - name: pytest
        run: |
          set -e
          python3 -m venv .venv
          source .venv/bin/activate
          pip install json-tools-rs --no-index --find-links dist --force-reinstall
          pip install pytest
          pytest

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [linux, musllinux, windows, macos, sdist]
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: actions/download-artifact@v4
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'wheels-*/*'
      - name: Publish to crates.io
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        # --allow-dirty: the actions/download-artifact step above downloads all
        # wheels-*/sdist artifacts into the working directory as untracked files,
        # which cargo publish's dirty-checkout guard otherwise refuses to run
        # against. Safe here specifically because this job always starts from a
        # fresh tag checkout -- the only "dirty" files are those artifact
        # downloads, never an actual uncommitted source change.
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --allow-dirty
      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PIP_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*
