name: Documentation

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.44/mdbook-v0.4.44-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          chmod +x mdbook
      - name: Build book
        run: ./mdbook build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./book
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
