version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "rust"
    ignore:
      # indexmap 2.12.0 raised its own rust-version to 1.82, and 2.14.0 requires
      # edition2024 (~1.85) -- both above this crate's MSRV of 1.80. See the pin
      # comment on the `indexmap` dependency in Cargo.toml.
      - dependency-name: "indexmap"
        versions: [">=2.12.0"]
      # sonic-rs 0.5.8 uses exposed_provenance/strict_provenance, which require a
      # newer rustc than this crate's MSRV of 1.80 (confirmed via a real MSRV CI
      # failure) despite being a semver-patch bump upstream. See the pin comment
      # on the `sonic-rs` dependency in Cargo.toml.
      - dependency-name: "sonic-rs"
        versions: [">0.5.7"]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"
