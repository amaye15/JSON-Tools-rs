[book]
title = "JSON Tools RS Guide"
authors = ["JSON Tools RS Contributors"]
language = "en"
src = "src"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/amaye15/json-tools-rs"
edit-url-template = "https://github.com/amaye15/json-tools-rs/edit/master/docs/{path}"

[output.html.search]
enable = true
